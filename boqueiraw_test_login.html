<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Login Boqueirão</title>
<style>
  #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 99999; background: linear-gradient(135deg, #f9a825 0%, #e65100 100%); }
  .login-box { background: #111; border-radius: 4px; padding: 40px 32px; width: 90%; max-width: 380px; box-shadow: 0 0 40px #f9a82544; border: 1px solid #f9a82533; }
  .login-box h1 { font-size: 1.4rem; color: #f9a825; text-align: center; margin-bottom: 6px; }
  .login-box p { font-size: 0.82rem; color: #888; text-align: center; margin-bottom: 28px; }
  .login-box input { width: 100%; padding: 12px; margin-bottom: 12px; background: #222; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 1rem; box-sizing: border-box; }
  .login-box input:focus { border-color: #f9a825; }
  .login-box button { width: 100%; padding: 14px; background: #f9a825; color: #111; border: none; border-radius: 4px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  .login-box button:hover { background: #e65100; }
  #login-erro { color: #b71c1c; font-size: 0.85rem; text-align: center; margin-top: 10px; display: none; }
  #app { display: none; padding: 20px; color: #fff; background: #111; min-height: 100vh; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>🏪 Prensadão Boqueirão</h1>
    <p>Acessa aí, parceiro 🔥</p>
    <label>Usuário</label>
    <input type="text" id="login-usuario" placeholder="Qual é o seu nome, parceiro?" autocomplete="username" onkeydown="if(event.key==='Enter')fazerLogin();" />
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="Senha, sangue" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin();" />
    <button onclick="fazerLogin()">🔓 BORA ENTRAR</button>
    <div id="login-erro">❌ Errou feio, mano! Tenta de novo.</div>
  </div>
</div>

<div id="app">
  <h1>✅ LOGADO!</h1>
  <p id="user-info"></p>
  <button onclick="sair()">Sair</button>
</div>

<script>
const SUPA_URL = 'https://trbyynbtuzpszdvjivbs.supabase.co';
const SUPA_ANON = 'sb_publishable_lA_OIFoNVpmh5fmxNwu_1w_f9waqXfj';
let usuarioLogado = null;

async function supa(metodo, tabela, dados=null, params='') {
  const opts = {
    method: metodo,
    headers: { 'apikey': SUPA_ANON, 'Authorization': 'Bearer ' + SUPA_ANON, 'Content-Type': 'application/json' }
  };
  if (dados) opts.body = JSON.stringify(dados);
  const r = await fetch(`${SUPA_URL}/rest/v1/${tabela}?${params}`, opts);
  if (metodo === 'GET') return r.json();
  return r.ok;
}

async function fazerLogin() {
  const usuario = document.getElementById('login-usuario').value.trim();
  const senha = document.getElementById('login-senha').value.trim();
  if (!usuario || !senha) { document.getElementById('login-erro').style.display='block'; return; }
  try {
    const res = await supa('GET', 'usuario', null, 'usuario=eq.' + encodeURIComponent(usuario) + '&senha=eq.' + encodeURIComponent(senha) + '&unidade=eq.boqueiraw&select=*');
    if (res && res.length > 0) {
      usuarioLogado = res[0];
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-info').textContent = usuarioLogado.usuario + ' · ' + usuarioLogado.perfil;
    } else {
      document.getElementById('login-erro').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('login-erro').textContent = 'Erro: ' + e.message;
    document.getElementById('login-erro').style.display = 'block';
  }
}

function sair() {
  usuarioLogado = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
</script>
</body>
</html>
